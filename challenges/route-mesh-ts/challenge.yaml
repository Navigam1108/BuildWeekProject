slug: route-mesh-ts
title: "RouteMesh — API route resolution"
language: typescript
level: mid
image: challenge-ts
domain: API infrastructure
summary: "Improve route and policy resolution in a multi-tenant edge gateway."
task: |
  EDGE-386: RouteMesh repeatedly scans route, middleware, and policy records on
  the request path. Keep the Router API unchanged while improving resolution,
  middleware selection, weighted backends, authorization checks, and route cache.
grading:
  bench_target_ms: 300
  bench_baseline_ms: 9000
  golden_target_pct: 50
  missions:
    - { id: routes, name: Route resolution, concepts: [trie, prefix map], weight: 20, benchmark: Path lookup }
    - { id: middleware, name: Middleware lookup, concepts: [hashing, compiled chain], weight: 20, benchmark: Chain build }
    - { id: weighted, name: Weighted backend choice, concepts: [prefix sum, binary search], weight: 20, benchmark: Backend choice }
    - { id: policy, name: Tenant policy checks, concepts: [set membership, keyed lookup], weight: 20, benchmark: Authorization }
    - { id: cache, name: Compiled route cache, concepts: [cache, invalidation], weight: 20, benchmark: Repeat resolution }
